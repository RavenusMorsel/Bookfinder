name: Build Kivy APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'  # reliable OpenJDK
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip python3-pip autoconf libtool pkg-config \
          zlib1g-dev libncurses6 libncursesw6 libtinfo6 cmake libffi-dev libssl-dev \
          libltdl-dev libsqlite3-dev libreadline-dev libbz2-dev liblzma-dev

    - name: Install Python tools
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --user cython==0.29.37 buildozer

    - name: Manually install Android command-line tools with Java 17
      run: |
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $ANDROID_HOME/cmdline-tools

        cd $ANDROID_HOME/cmdline-tools

        # Download commandlinetools (latest as of 2025/2026)
        curl -o commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip

        unzip -q commandlinetools.zip
        rm commandlinetools.zip
        mv cmdline-tools latest

        # Legacy symlink for Buildozer
        mkdir -p $ANDROID_HOME/tools/bin
        ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager

        # Force Java 17 everywhere
        export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH

        # Verify Java version
        java -version

        # Accept licenses using Java 17 sdkmanager
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

        # Install required packages
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          "build-tools;33.0.0" \
          "platform-tools" \
          "platforms;android-33" \
          "cmdline-tools;latest" || echo "sdkmanager install had warnings - continuing"

        # Export for Buildozer
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
        echo "PATH=$JAVA_HOME/bin:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/tools/bin:$PATH" >> $GITHUB_ENV

    - name: Build APK
      run: buildozer -v android debug

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: bin/*.apk
