name: Build Kivy APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04   # or ubuntu-22.04 if you prefer

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config \
          zlib1g-dev libncurses6 libncursesw6 libtinfo6 cmake \
          libffi-dev libssl-dev libltdl-dev libsqlite3-dev libreadline-dev \
          libbz2-dev liblzma-dev

    - name: Install Python build tools
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --user cython==0.29.37 buildozer

    - name: Build APK
      run: buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: bin/*.apk
