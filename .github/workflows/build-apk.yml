name: Build Kivy APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04   # ← Use 22.04 for best compatibility

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config \
          zlib1g-dev libncurses6 libncursesw6 libtinfo6 cmake libffi-dev libssl-dev \
          libltdl-dev libsqlite3-dev libreadline-dev libbz2-dev liblzma-dev

    - name: Install Python tools
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --user cython==0.29.37 buildozer

    - name: Manually download and set up Android cmdline-tools
      run: |
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $ANDROID_HOME/cmdline-tools

        cd $ANDROID_HOME/cmdline-tools

        # Download latest command-line tools zip (update version if Google changes it)
        curl -o commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip

        unzip -q commandlinetools.zip
        rm commandlinetools.zip

        # Move contents to 'latest' folder (Buildozer and sdkmanager expect this)
        mv cmdline-tools latest

        # Create legacy symlink for Buildozer's expected path
        mkdir -p $ANDROID_HOME/tools/bin
        ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager

        # Accept all licenses non-interactively
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

        # Install essential packages (build-tools includes aidl)
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          "build-tools;33.0.0" \
          "platform-tools" \
          "platforms;android-33" \
          "cmdline-tools;latest" || echo "Some packages failed to install - continuing anyway"

        # Export paths for Buildozer
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/tools/bin:$PATH" >> $GITHUB_ENV

    - name: Build APK
      run: buildozer -v android debug

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: bin/*.apk
